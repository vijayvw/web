name: Build and Deploy

on:
  push:
    branches:
      - master

jobs:
  docker:
    runs-on: self-hosted

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/test:${{ github.sha }} .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/test:${{ github.sha }}

      - name: Verify Cluster Access
        run: |
          kubectl get nodes

      - name: Deploy Resources
        run: |
          kubectl apply -f deployment.yaml
          kubectl apply -f deployment-svc.yaml

      - name: Update Deployment Image
        run: |
          kubectl set image deployment/login-page \
          login-page=${{ secrets.DOCKER_USERNAME }}/test:${{ github.sha }}

      - name: Wait for Rollout
        run: |
          kubectl rollout status deployment/login-page

      - name: Verify Deployment
        run: |
          kubectl get deployments
          kubectl get pods -o wide
          kubectl get svc
